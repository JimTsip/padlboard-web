<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padlboard — Score. Track. Elevate.</title>
<meta name="description" content="Padlboard is a padel companion for Apple Watch, iPhone, and web. Live scoring, real stats, zero setup. Launching soon.">
<link rel="icon" type="image/png" href="logo.png">
<meta property="og:title" content="Padlboard — Score. Track. Elevate.">
<meta property="og:description" content="The padel companion for Apple Watch, iPhone, and web. Launching soon.">
<meta property="og:image" content="https://padlboard.ai/logo.png">
<meta name="theme-color" content="#080420">
<style>
  :root {
    --bg: #080420;
    --card: #1a1046;
    --line: #2a1f5c;
    --action: #f5ff00;
    --action-dim: rgba(245, 255, 0, 0.12);
    --green: #00ffa3;
    --purple: #6a00ff;
    --text-primary: #ffffff;
    --text-secondary: #a69fd1;
    --text-tertiary: #6e67a0;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    min-height: 100%;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    background:
      radial-gradient(circle at 20% 15%, rgba(106, 0, 255, 0.35), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(0, 255, 163, 0.15), transparent 45%),
      var(--bg);
  }

  main {
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  .logo {
    width: 96px;
    height: 96px;
    border-radius: 26px;
    margin-bottom: 28px;
    box-shadow: 0 0 60px rgba(245, 255, 0, 0.2);
  }

  h1 {
    font-size: 2.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0 0 10px;
  }

  .tagline {
    color: var(--action);
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin: 0 0 22px;
  }

  p.sub {
    color: var(--text-secondary);
    font-size: 1.05rem;
    line-height: 1.55;
    margin: 0 0 36px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 999px;
    background: var(--action-dim);
    color: var(--action);
    font-weight: 800;
    font-size: 0.8rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .badge .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--action);
  }

  form {
    display: flex;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 8px;
  }

  @media (max-width: 480px) {
    form { flex-direction: column; }
  }

  input[type="email"] {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-size: 1rem;
    padding: 12px 14px;
  }

  input[type="email"]::placeholder { color: var(--text-tertiary); }

  button {
    appearance: none;
    border: none;
    border-radius: 12px;
    background: var(--action);
    color: #080420;
    font-weight: 800;
    font-size: 1rem;
    padding: 14px 22px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  button:hover { transform: translateY(-1px); }
  button:disabled { opacity: 0.6; cursor: default; transform: none; }

  #status {
    margin-top: 16px;
    font-size: 0.9rem;
    font-weight: 600;
    min-height: 1.2em;
  }

  #status[data-state="ok"] { color: var(--green); }
  #status[data-state="error"] { color: #ff4d6d; }
  #status[data-state="pending"] { color: var(--text-tertiary); }

  footer {
    margin-top: 48px;
    color: var(--text-tertiary);
    font-size: 0.85rem;
  }
</style>
</head>
<body>
<main>
  <img class="logo" src="logo.png" alt="Padlboard">
  <div class="badge"><span class="dot"></span>Coming soon</div>
  <h1>Padlboard</h1>
  <p class="tagline">Score. Track. Elevate.</p>
  <p class="sub">The padel companion for Apple Watch, iPhone, and web. Live scoring, real stats, zero setup. Be first to know when we launch.</p>

  <form id="waitlist-form">
    <input type="email" id="email" name="email" placeholder="you@email.com" autocomplete="email" required>
    <button type="submit" id="submit-btn">Notify me</button>
  </form>
  <p id="status" role="status" aria-live="polite"></p>

  <footer>&copy; <span id="year"></span> Padlboard</footer>
</main>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const SUPABASE_URL = 'https://hcgyuslsqorhvsmxvemf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjZ3l1c2xzcW9yaHZzbXh2ZW1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNTEwNDUsImV4cCI6MjA5ODgyNzA0NX0.MYl6pUmxDM6qSM2wmHoXdLbNh4lwHYBuYOK3jgGy5k0';

  const form = document.getElementById('waitlist-form');
  const statusEl = document.getElementById('status');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) return;

    submitBtn.disabled = true;
    statusEl.dataset.state = 'pending';
    statusEl.textContent = 'Joining…';

    try {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/waitlist_signups`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ email })
      });

      if (response.ok) {
        statusEl.dataset.state = 'ok';
        statusEl.textContent = "You're on the list — we'll email you at launch.";
        form.reset();
      } else if (response.status === 409) {
        statusEl.dataset.state = 'ok';
        statusEl.textContent = "You're already on the list!";
      } else {
        throw new Error('Request failed');
      }
    } catch (err) {
      statusEl.dataset.state = 'error';
      statusEl.textContent = 'Something went wrong — please try again.';
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
